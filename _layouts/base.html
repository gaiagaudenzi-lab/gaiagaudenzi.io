<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% if page.title %}{{ page.title }} | {% endif %}Gaia Gaudenzi</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --font: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
  --magenta: #b5179e;
  --near-black: #1a1a1a;
  --mid-gray: #555;
  --light-gray: #888;
  --border: #e0ddd8;
}
html, body { background: #fff; color: var(--near-black); font-family: var(--font); font-size: 16px; line-height: 1.65; }
a { color: var(--magenta); text-decoration: none; }
a:hover { text-decoration: underline; }

/* NAV */
nav { width: 100%; padding: 18px 0 14px; border-bottom: 1px solid var(--border); text-align: center; }
nav ul { list-style: none; display: inline-flex; gap: 28px; flex-wrap: wrap; justify-content: center; }
nav ul li a { font-size: 14px; font-weight: 400; color: var(--mid-gray); text-decoration: none; letter-spacing: 0.02em; transition: color 0.2s; }
nav ul li a:hover, nav ul li a.active { color: var(--magenta); }

/* CONTAINER */
.container { max-width: 860px; margin: 0 auto; padding: 0 32px; }

/* HOME HERO */
.hero { padding: 56px 0 48px; display: grid; grid-template-columns: 1fr 220px; gap: 48px; align-items: start; }
.hero-name { font-size: 2.6rem; font-weight: 700; line-height: 1.1; margin-bottom: 6px; letter-spacing: -0.02em; }
.hero-name .first { font-weight: 700; }
.hero-name .last { font-weight: 300; }
.hero-affiliation { font-size: 13px; font-weight: 400; color: var(--magenta); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 22px; }
.hero-divider { width: 36px; height: 2px; background: var(--magenta); margin-bottom: 20px; }
.hero-bio { font-size: 15px; color: #333; line-height: 1.7; margin-bottom: 28px; max-width: 520px; }
.hero-links { display: flex; gap: 20px; flex-wrap: wrap; align-items: center; }
.hero-links a { font-size: 13px; color: var(--mid-gray); text-decoration: none; transition: color 0.2s; }
.hero-links a:hover { color: var(--magenta); }
.hero-photo { display: flex; flex-direction: column; align-items: center; }
.photo-wrapper { width: 200px; height: 200px; border-radius: 50%; overflow: hidden; border: 3px solid var(--near-black); transition: border-color 0.4s; }
.photo-wrapper:hover { border-color: var(--magenta); }
.photo-wrapper img { width: 100%; height: 100%; object-fit: cover; object-position: center top; filter: grayscale(100%); transition: filter 0.4s ease; display: block; }
.photo-wrapper:hover img { filter: grayscale(0%); }

/* HOME SECTIONS */
.section { padding: 40px 0; border-top: 1px solid var(--border); }
.section-title { font-size: 11px; font-weight: 600; letter-spacing: 0.14em; text-transform: uppercase; color: var(--light-gray); margin-bottom: 24px; }
.paper-list { list-style: none; display: flex; flex-direction: column; gap: 20px; }
.paper-item { display: flex; gap: 16px; align-items: flex-start; }
.paper-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--magenta); flex-shrink: 0; margin-top: 7px; }
.paper-title { font-size: 15px; font-weight: 600; line-height: 1.4; margin-bottom: 3px; color: var(--near-black); }
.paper-meta { font-size: 13px; color: var(--light-gray); margin-bottom: 6px; }
.paper-tag { display: inline-block; font-size: 11px; font-weight: 500; color: var(--magenta); border: 1px solid var(--magenta); border-radius: 3px; padding: 1px 8px; }
.news-list { list-style: none; }
.news-item { display: grid; grid-template-columns: 120px 1fr; gap: 16px; padding: 10px 0; border-bottom: 1px solid var(--border); font-size: 14px; }
.news-date { color: var(--light-gray); font-size: 13px; }

/* PAGE LAYOUT */
.page-content { padding: 56px 0 64px; }
.page-title { font-size: 1.9rem; font-weight: 700; letter-spacing: -0.02em; margin-bottom: 10px; line-height: 1.2; }
.page-divider { width: 36px; height: 2px; background: var(--magenta); margin-bottom: 32px; }
.page-body { font-size: 15px; color: #333; line-height: 1.75; max-width: 640px; }
.page-body h1 { font-size: 1.4rem; font-weight: 700; color: var(--near-black); margin: 32px 0 12px; line-height: 1.3; }
.page-body h2 { font-size: 1.1rem; font-weight: 700; color: var(--near-black); margin: 28px 0 10px; }
.page-body h3 { font-size: 0.95rem; font-weight: 600; color: var(--near-black); margin: 20px 0 8px; }
.page-body p { margin-bottom: 16px; }
.page-body ul, .page-body ol { margin: 0 0 16px 20px; }
.page-body li { margin-bottom: 6px; }
.page-body a { color: var(--magenta); }
.page-body strong { font-weight: 600; color: var(--near-black); }
.page-body em { font-style: italic; }
.page-body hr { border: none; border-top: 1px solid var(--border); margin: 32px 0; }
.page-body table { width: 100%; border-collapse: collapse; margin-bottom: 20px; font-size: 14px; }
.page-body th { text-align: left; font-weight: 600; padding: 8px 12px; border-bottom: 2px solid var(--border); }
.page-body td { padding: 8px 12px; border-bottom: 1px solid var(--border); }
.page-body blockquote { border-left: 3px solid var(--magenta); padding-left: 16px; color: var(--mid-gray); margin: 20px 0; font-style: italic; }
.page-body code { font-size: 13px; background: #f5f5f5; padding: 2px 5px; border-radius: 3px; }
.page-body pre { background: #f5f5f5; padding: 16px; border-radius: 4px; overflow-x: auto; margin-bottom: 16px; }
.page-body pre code { background: none; padding: 0; }

/* BLOG LIST */
.post-list { list-style: none; }
.post-item { padding: 20px 0; border-bottom: 1px solid var(--border); }
.post-item:first-child { padding-top: 0; }
.post-date { font-size: 12px; color: var(--light-gray); margin-bottom: 4px; }
.post-link { font-size: 16px; font-weight: 600; color: var(--near-black); text-decoration: none; }
.post-link:hover { color: var(--magenta); text-decoration: none; }
.post-excerpt { font-size: 14px; color: var(--mid-gray); margin-top: 6px; }

/* FOOTER */
footer { padding: 32px 0; text-align: center; font-size: 12px; color: var(--light-gray); border-top: 1px solid var(--border); }

/* RESPONSIVE */
@media (max-width: 640px) {
  .hero { grid-template-columns: 1fr; }
  .hero-photo { order: -1; align-items: flex-start; }
  .photo-wrapper { width: 140px; height: 140px; }
  .hero-name { font-size: 2rem; }
  .page-title { font-size: 1.5rem; }
  .container { padding: 0 20px; }
}
</style>
</head>
<body>

<nav>
  <ul>
    <li><a href="{{ site.baseurl }}/"{% if page.url == "/" %} class="active"{% endif %}>about</a></li>
    <li><a href="{{ site.baseurl }}/blog/"{% if page.url contains "/blog" %} class="active"{% endif %}>blog</a></li>
    <li><a href="{{ site.baseurl }}/cv/"{% if page.url contains "/cv" %} class="active"{% endif %}>cv</a></li>
    <li><a href="{{ site.baseurl }}/resources/"{% if page.url contains "/resources" %} class="active"{% endif %}>resources</a></li>
    <li><a href="{{ site.baseurl }}/stata_training/"{% if page.url contains "/stata" %} class="active"{% endif %}>stata training</a></li>
  </ul>
</nav>

{{ content }}

<footer>
  &copy; 2025 Gaia Gaudenzi &middot; Economics PhD &middot; University of Maryland
</footer>

</body>
</html>
