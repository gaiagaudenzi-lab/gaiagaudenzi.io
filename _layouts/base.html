<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% if page.title %}{{ page.title }} | {% endif %}Gaia Gaudenzi</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --font: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
  --magenta: #b5179e;
  --near-black: #1a1a1a;
  --mid-gray: #555;
  --light-gray: #888;
  --border: #e0ddd8;
}
html, body {
  background: #fff;
  color: var(--near-black);
  font-family: var(--font);
  font-size: 16px;
  line-height: 1.65;
}
a { color: var(--magenta); text-decoration: none; }
a:hover { text-decoration: underline; }
nav {
  width: 100%;
  padding: 18px 0 14px;
  border-bottom: 1px solid var(--border);
  text-align: center;
}
nav ul { list-style: none; display: inline-flex; gap: 28px; flex-wrap: wrap; justify-content: center; }
nav ul li a {
  font-family: var(--font);
  font-size: 14px; font-weight: 400; color: var(--mid-gray);
  text-decoration: none; letter-spacing: 0.02em; transition: color 0.2s;
}
nav ul li a:hover { color: var(--magenta); }
nav ul li a.active { color: var(--magenta); }
.container { max-width: 860px; margin: 0 auto; padding: 0 32px; }
.page-content {
  padding: 56px 0 64px;
}
.page-title {
  font-family: var(--font);
  font-size: 1.9rem; font-weight: 700; letter-spacing: -0.02em;
  margin-bottom: 10px; line-height: 1.2;
}
.page-title .light { font-weight: 300; }
.page-meta {
  font-size: 13px; color: var(--magenta); letter-spacing: 0.08em;
  text-transform: uppercase; margin-bottom: 28px;
}
.page-divider { width: 36px; height: 2px; background: var(--magenta); margin-bottom: 32px; }
.page-body {
  font-family: var(--font);
  font-size: 15px; color: #333; line-height: 1.75; max-width: 640px;
}
.page-body h1, .page-body h2, .page-body h3, .page-body h4 {
  font-family: var(--font); font-weight: 700; color: var(--near-black);
  margin: 32px 0 12px; line-height: 1.3;
}
.page-body h2 { font-size: 1.1rem; letter-spacing: 0.01em; }
.page-body h3 { font-size: 0.95rem; font-weight: 600; }
.page-body p { margin-bottom: 16px; }
.page-body ul, .page-body ol { margin: 0 0 16px 20px; }
.page-body li { margin-bottom: 6px; }
.page-body a { color: var(--magenta); }
.page-body strong { font-weight: 600; color: var(--near-black); }
.page-body hr { border: none; border-top: 1px solid var(--border); margin: 32px 0; }
.page-body table { width: 100%; border-collapse: collapse; margin-bottom: 20px; font-size: 14px; }
.page-body th { text-align: left; font-weight: 600; padding: 8px 12px; border-bottom: 2px solid var(--border); }
.page-body td { padding: 8px 12px; border-bottom: 1px solid var(--border); }
/* Post list styles */
.post-list { list-style: none; }
.post-item { padding: 20px 0; border-bottom: 1px solid var(--border); }
.post-item:first-child { padding-top: 0; }
.post-date { font-size: 12px; color: var(--light-gray); margin-bottom: 4px; font-family: var(--font); }
.post-link { font-size: 16px; font-weight: 600; color: var(--near-black); text-decoration: none; }
.post-link:hover { color: var(--magenta); text-decoration: none; }
.post-excerpt { font-size: 14px; color: var(--mid-gray); margin-top: 6px; }
footer {
  padding: 32px 0; text-align: center; font-size: 12px;
  color: var(--light-gray); border-top: 1px solid var(--border); font-family: var(--font);
}
@media (max-width: 640px) {
  .page-title { font-size: 1.5rem; }
  .container { padding: 0 20px; }
}
</style>
</head>
<body>

<nav>
  <ul>
    <li><a href="{{ site.baseurl }}/"{% if page.url == "/" %} class="active"{% endif %}>about</a></li>
    <li><a href="{{ site.baseurl }}/blog/"{% if page.url contains "/blog" %} class="active"{% endif %}>blog</a></li>
    <li><a href="{{ site.baseurl }}/cv/"{% if page.url contains "/cv" %} class="active"{% endif %}>cv</a></li>
    <li><a href="{{ site.baseurl }}/resources/"{% if page.url contains "/resources" %} class="active"{% endif %}>resources</a></li>
    <li><a href="{{ site.baseurl }}/stata_training/"{% if page.url contains "/stata" %} class="active"{% endif %}>stata training</a></li>
  </ul>
</nav>

{{ content }}

<footer>
  &copy; 2025 Gaia Gaudenzi &middot; Economics PhD &middot; University of Maryland
</footer>

</body>
</html>
