---
layout: base
---
<div class="container">
  <div class="page-content">
    <h1 class="page-title">{{ page.title }}</h1>
    {% if page.date %}
    <p class="page-meta">{{ page.date | date: "%B %-d, %Y" }}</p>
    {% endif %}
    <div class="page-divider"></div>
    <div class="page-body">
      {{ content }}
    </div>
  </div>
</div>
