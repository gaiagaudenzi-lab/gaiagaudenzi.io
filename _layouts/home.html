---
layout: base
---
<div class="container">

  <section class="hero">
    <div class="hero-left">
      <h1 class="hero-name">
        <span class="first">Gaia</span> <span class="last">Gaudenzi</span>
      </h1>
      <p class="hero-affiliation"></p>
      <div class="hero-divider"></div>
      <div class="hero-bio">
        {{ content }}
      </div>
      <div class="hero-links">
        <a href="mailto:{{ site.email }}">&#9993; Email</a>
        <a href="{{ site.baseurl }}/cv/">&#128196; CV</a>
      </div>
    </div>
    <div class="hero-photo">
      <div class="photo-wrapper">
        <img src="{{ site.baseurl }}/assets/images/bio-photo.png" alt="Gaia Gaudenzi">
      </div>
    </div>
  </section>

  <section class="section">
    <h2 class="section-title">News</h2>
    <ul class="news-list">
      <li class="news-item">
        <span class="news-date">Jun 2026</span>
        <span class="news-text">Created personal website.</span>
      </li>
    </ul>
  </section>

</div>
